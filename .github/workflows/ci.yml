name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint & format
        run: bun run lint:ci
      - name: Typecheck
        run: bun run check
      - name: Unit tests
        run: bun run test
      - name: Build
        run: bun run build
      - name: Upload plugin build
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-image-layouts
          path: |
            build/main.js
            build/styles.css
            manifest.json
